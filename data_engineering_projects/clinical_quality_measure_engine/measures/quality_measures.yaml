# This file contains all quality measure definitions

measures:
  - measure_id: DM_CBP_001
    measure_name: "Diabetes: Blood Pressure Control"
    description: "Percentage of patients aged 18-85 with diabetes who have blood pressure < 140/90"
    numerator_sql: |
      SELECT DISTINCT p.patient_id
      FROM patients p
      INNER JOIN blood_pressure bp ON p.patient_id = bp.patient_id
      WHERE p.has_diabetes = true
        AND p.age BETWEEN 18 AND 85
        AND bp.systolic_bp < 140
        AND bp.diastolic_bp < 90
    denominator_sql: |
      SELECT DISTINCT p.patient_id
      FROM patients p
      WHERE p.has_diabetes = true
        AND p.age BETWEEN 18 AND 85
    exclusions_sql: |
      SELECT DISTINCT p.patient_id
      FROM patients p
      WHERE p.has_diabetes = true
        AND p.age > 85

  - measure_id: HTN_001
    measure_name: "Hypertension: Blood Pressure Control"
    description: "Percentage of patients aged 18-85 with hypertension who have blood pressure < 140/90"
    numerator_sql: |
      SELECT DISTINCT p.patient_id
      FROM patients p
      INNER JOIN blood_pressure bp ON p.patient_id = bp.patient_id
      WHERE p.has_hypertension = true
        AND p.age BETWEEN 18 AND 85
        AND bp.systolic_bp < 140
        AND bp.diastolic_bp < 90
    denominator_sql: |
      SELECT DISTINCT p.patient_id
      FROM patients p
      WHERE p.has_hypertension = true
        AND p.age BETWEEN 18 AND 85
    exclusions_sql: |
      SELECT DISTINCT p.patient_id
      FROM patients p
      WHERE p.has_hypertension = true
        AND (p.age > 85 OR p.is_pregnant = true OR p.hospice_care = true)

  - measure_id: DM_HBA1C_002
    measure_name: "Diabetes: HbA1c Control"
    description: "Percentage of patients with diabetes with HbA1c < 8.0%"
    numerator_sql: |
      SELECT DISTINCT p.patient_id
      FROM patients p
      INNER JOIN lab_results l ON p.patient_id = l.patient_id
      WHERE p.has_diabetes = true
        AND l.lab_name = 'hba1c'
        AND l.lab_value < 8.0
    denominator_sql: |
      SELECT DISTINCT p.patient_id
      FROM patients p
      WHERE p.has_diabetes = true
        AND p.age BETWEEN 18 AND 75
    exclusions_sql: |
      SELECT DISTINCT p.patient_id
      FROM patients p
      WHERE p.has_diabetes = true
        AND (p.age > 75 OR p.is_pregnant = true)

  - measure_id: LDL_001
    measure_name: "Diabetes: LDL Control"
    description: "Percentage of patients with diabetes with LDL < 100 mg/dL"
    numerator_sql: |
      SELECT DISTINCT p.patient_id
      FROM patients p
      INNER JOIN lab_results l ON p.patient_id = l.patient_id
      WHERE p.has_diabetes = true
        AND l.lab_name = 'ldl'
        AND l.lab_value < 100
    denominator_sql: |
      SELECT DISTINCT p.patient_id
      FROM patients p
      WHERE p.has_diabetes = true
        AND p.age BETWEEN 18 AND 75
    exclusions_sql: |
      SELECT DISTINCT p.patient_id
      FROM patients p
      WHERE p.has_diabetes = true
        AND p.age > 75
