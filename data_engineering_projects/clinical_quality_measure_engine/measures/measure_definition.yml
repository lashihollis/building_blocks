# Create the measure definition YAML file

# Measure ID: Unique identifier for this quality measure
# Format: [Clinical Area]_[Measure Type]_[Number]
measure_id: DM_CBP_001

# Display name - what users will see in reports
measure_name: Diabetes: Blood Pressure Control

# Description explaining what this measure calculates
description: Percentage of patients aged 18-85 with diabetes who have blood pressure < 140/90

# NUMERATOR SQL: Patients who meet the quality criteria
# These are patients who are receiving the desired care
numerator_sql: |
  SELECT DISTINCT p.patient_id
  FROM patients p
  INNER JOIN blood_pressure bp ON p.patient_id = bp.patient_id
  WHERE p.has_diabetes = true
    AND p.age BETWEEN 18 AND 85
    AND bp.systolic_bp < 140
    AND bp.diastolic_bp < 90

# DENOMINATOR SQL: Patients eligible for the measure
# This defines the population we're measuring
denominator_sql: |
  SELECT DISTINCT p.patient_id
  FROM patients p
  WHERE p.has_diabetes = true
    AND p.age BETWEEN 18 AND 85

# EXCLUSIONS SQL: Patients who should be removed from denominator
# These are patients who shouldn't be counted in the measure
# Example: Patients over 85 might have different BP targets
exclusions_sql: |
  SELECT DISTINCT p.patient_id
  FROM patients p
  WHERE p.has_diabetes = true
    AND p.age > 85
