name: Refresh Mock Healthcare Data

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows you to trigger this manually from the GitHub UI

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install pandas numpy

    - name: Run data generator script
      working-directory: hc_quality_measures_dbt
      run: |
        python generate_data.py

    - name: Commit and push updated source files
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Stage the files
        git add hc_quality_measures_dbt/seeds/seed_patients.csv hc_quality_measures_dbt/seeds/source_*.csv
        
        # Check if there are staged changes to commit
        if ! git diff --cached --quiet; then
          git commit -m "chore: auto-refresh mock healthcare source data"
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "No changes detected in mock data. Skipping push."
          exit 0 # <--- This ensures the pipeline marks itself as a SUCCESS when there's nothing new
        fi
