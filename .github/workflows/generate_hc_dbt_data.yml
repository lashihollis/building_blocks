name: Refresh Mock Healthcare Data
on:
  schedule:
    - cron: '0 23 * * 4'
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to push generated data to (defaults to main)'
        required: false
        default: 'main'
permissions:
  contents: write
concurrency:
  group: refresh-mock-data
  cancel-in-progress: false
jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install pandas numpy

    - name: Run data generator script
      working-directory: hc_quality_measures_dbt
      run: |
        python generate_data.py

    - name: Commit and push updated source files
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TARGET_BRANCH: ${{ github.event.inputs.target_branch || 'main' }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        echo "Target branch: $TARGET_BRANCH"

        # Stage the files
        git add hc_quality_measures_dbt/seeds/seed_patients.csv hc_quality_measures_dbt/seeds/source_*.csv

        # Check if there are staged changes to commit
        if ! git diff --cached --quiet; then
          git commit -m "chore: auto-refresh mock healthcare source data"

          # Sync with remote before pushing to avoid non-fast-forward rejection
          git fetch origin "$TARGET_BRANCH"
        fi
