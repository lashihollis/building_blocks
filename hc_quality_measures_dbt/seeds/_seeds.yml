version: 2

seeds:
  - name: dx_codes
    description: |
      Lookup table for ICD-10 diagnosis codes with condition categorization.
      Used to identify patients with hypertension and other conditions for quality measures.
    columns:
      - name: dx_code
        description: ICD-10 diagnosis code
        tests:
          - unique
          - not_null
      - name: dx_name
        description: Human-readable diagnosis name
      - name: condition_category
        description: |
          Categorization of diagnosis for quality measure grouping.
          Values: 'hypertension', 'diabetes'
        tests:
          - accepted_values:
              values: ['hypertension', 'diabetes']

  - name: source_priority
    description: |
      Lookup table defining source trust ranking. Lower priority_rank = higher trust.
      Used in ranking logic to select best available source for each measurement.
    columns:
      - name: source_system
        description: Source system identifier (payer, ehr, patient_reported)
        tests:
          - unique
          - not_null
      - name: priority_rank
        description: |
          Priority order (1 = highest trust, 4 = lower trust)
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4]
      - name: trust_level
        description: Human-readable trust level ('high', 'medium', 'medium_low', 'low')
        tests:
          - accepted_values:
              values: ['high', 'medium', 'medium_low', 'low']
