version: 2

models:
  - name: int_diagnoses_unioned
    description: |
      Union of all diagnosis data from payer and EHR sources. Links patients to
      diagnosis codes with source attribution.
    columns:
      - name: patient_id
        description: Patient identifier
        tests:
          - not_null
      - name: encounter_id
        description: Encounter where diagnosis was recorded
        tests:
          - not_null
      - name: dx_code
        description: ICD-10 diagnosis code
        tests:
          - not_null
      - name: source_system
        description: Original source system
