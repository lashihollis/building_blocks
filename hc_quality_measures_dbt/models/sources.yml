version: 2

sources:
  - name: healthcare_sources
    description: "Automated healthcare datasets updated via GitHub Actions CI/CD"
    meta:
      external_location: "./seeds/{name}.csv"
    tables:
      - name: seed_patients
        description: Master ground-truth list of patients generated by the pipeline.
        columns:
          - name: patient_id
            tests:
              - unique
              - not_null

      - name: payer_data
        description: Unified payer seed data for diagnosis and vital staging models.
        columns:
          - name: patient_id
            tests:
              - not_null
          - name: encounter_id
            tests:
              - not_null

      - name: ehr_data
        description: Unified EHR seed data for diagnosis and vital staging models.
        columns:
          - name: patient_id
            tests:
              - not_null
          - name: encounter_id
            tests:
              - not_null

      - name: patient_reported_data
        description: Unified patient-reported seed data for vital staging models.
        columns:
          - name: patient_id
            tests:
              - not_null

      - name: source_payer_claims
        description: Payer diagnosis claims data (Highest trust for conditions).
        columns:
          - name: patient_id
            tests:
              - not_null
          - name: service_date
            tests:
              - not_null

      - name: source_ehr_conditions
        description: EHR clinical condition logs (Medium trust for conditions).
        columns:
          - name: patient_id
            tests:
              - not_null

      - name: source_ehr_vitals
        description: EHR recorded clinical vitals (Highest trust for physical readings).
        columns:
          - name: patient_id
            tests:
              - not_null

      - name: source_patient_reported_vitals
        description: Home app/device patient logged vitals (Lowest trust).
        columns:
          - name: patient_id
            tests:
              - not_null
          - name: logged_at
            tests:
              - not_null
